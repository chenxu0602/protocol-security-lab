[profile.default]
src = "src"
test = "test"
libs = ["lib"]
solc_version = "0.8.30"
optimizer = true
optimizer_runs = 200
allow_paths = [
    "../aave/aave-v3-core",
    "../aave/aave-v3-periphery"
]

remappings = [
    "@aave/core-v3/=lib/aave-v3-core/",
    "@aave/periphery-v3/=lib/aave-v3-periphery/",
    "forge-std/=lib/forge-std/src/",
    "@forge-std/=lib/forge-std/src/"
]

[fmt]
bracket_spacing = true
tab_width = 4
line_length = 100
int_types = "preserve"
quote_style = "single"
wrap_comments = true

[profile.ci]
offline = true
verbosity = 2

[fuzz]
runs = 256
